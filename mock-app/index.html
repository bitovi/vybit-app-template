<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My App</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function () {
        var name = import.meta.env.CODESPACE_NAME || "";
        var domain = import.meta.env.GITHUB_CODESPACES_PORT_FORWARDING_DOMAIN || "";
        var s = document.createElement("script");
        s.src =
          name && domain
            ? "https://" + name + "-3333." + domain + "/overlay.js"
            : "http://localhost:3333/overlay.js";
        document.head.appendChild(s);
      })();
    </script>
  </body>
</html>
